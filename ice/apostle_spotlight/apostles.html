<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        h1,
        h3 {
            font-family: Arial, Helvetica, sans-serif;
            color: white;
        }

        #box {
            border: 4px solid black;
            height: 700px;
            width: 800px;
            background-image: url(images/christus.webp);
            background-position: center;
            background-size: cover;
            border-radius: 32px;
            text-align: center;
        }

        .spotlight {
            border: 10px solid white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            display: inline-block;
            margin: 10px;
        }

        .spotlight img {
            width: 80px;
        }

        .spotlight:hover {
            border-color: black;
        }

        .firstpres {
            width: 100px;
            height: 100px;
        }

        .firstpres img {
            width: 100px;
        }

        .prophet {
            width: 120px;
            height: 120px
        }

        .prophet img {
            width: 120px;
        }

        #twelveapostles {
            margin:20px 150px
        }
    </style>
</head>

<body>
    <!-- Insert HTML elements here -->
    <div id="box">
        <h1>First Presidency</h1>
        <div class="spotlight firstpres">
            <img src="images/eyring.webp">
        </div>
        <div class="spotlight firstpres prophet">
            <img src="images/oaks.webp">
        </div>
        <div class="spotlight firstpres">
            <img src="images/christofferson.webp">
        </div>
        <h3>Quorum of the Twelve Apostles</h3>
        <div id="twelveapostles">
            <div class="spotlight">
                <img src="images/uchtdorf.webp">
            </div>
            <div class="spotlight">
                <img src="images/bednar.webp">
            </div>
            <div class="spotlight">
                <img src="images/cook.webp">
            </div>
            <div class="spotlight">
                <img src="images/anderson.webp">
            </div>
            <div class="spotlight">
                <img src="images/rasband.webp">
            </div>
            <div class="spotlight">
                <img src="images/stevenson.webp">
            </div>
            <div class="spotlight">
                <img src="images/renlund.webp">
            </div>
            <div class="spotlight">
                <img src="images/gong.webp">
            </div>
            <div class="spotlight">
                <img src="images/soares.webp">
            </div>
            <div class="spotlight">
                <img src="images/kearon.webp">
            </div>
            <div class="spotlight">
                <img src="images/causse.webp">
            </div>
            <div class="spotlight">
                <img src="images/gilbert.webp">
            </div>
        </div>
    </div>
</body>

</html>
